camera_1:
  role: danger_zone_and_helmet
  source: video_source/camera_1/cam1.mp4
  detectors:
    person: true
    ppe: true
  required_signals:
    - person_detected
    - helmet_or_head_detected
    - inside_danger_zone
    - stay_time_seconds
  optional_signals:
    - moving_toward_zone
  note: combined danger-zone intrusion and helmet verification

camera_2:
  role: danger_zone_only
  source: video_source/camera_2/cam2.mp4
  detectors:
    person: true
    ppe: false
  required_signals:
    - person_detected
    - inside_danger_zone
    - stay_time_seconds
  optional_signals:
    - moving_toward_zone
  note: danger-zone intrusion only

camera_3:
  role: helmet_only
  source: video_source/camera_3/cam3.mp4
  detectors:
    person: true
    ppe: true
  required_signals:
    - person_detected
    - helmet_or_head_detected
  optional_signals: []
  note: helmet compliance only