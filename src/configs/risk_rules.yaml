severity_thresholds:
  normal: [0, 24]
  warning: [25, 49]
  high: [50, 79]
  critical: [80, 100]

score_limits:
  min_score: 0
  max_score: 100

decision_policy:
  warning_min_score: 25
  violation_min_score: 50
  stable_violation_min_score: 80
  combined_violation_score: 100
  ppe_visibility_warning_score: 30

default_weights:
  person_detected: 0
  inside_danger_zone: 60
  no_helmet: 40
  stay_time_over_threshold: 20
  no_helmet_over_threshold: 20
  multiple_no_helmet_bonus: 20
  combined_danger_no_helmet_bonus: 10
  moving_toward_zone: 10
  uncertain_detection_penalty: -30

dwell_time:
  danger_zone_seconds: 2.0
  no_helmet_seconds: 2.0

camera_rules:
  camera_1:
    weights:
      person_detected: 0
      inside_danger_zone: 60
      no_helmet: 45
      stay_time_over_threshold: 10
      combined_danger_no_helmet_bonus: 10
      uncertain_detection_penalty: -15
    actions:
      normal: []
      warning:
        - save_history
        - ui_warning
      high:
        - save_history
        - ui_warning
        - relay_on
        - buzzer_on
      critical:
        - save_history
        - ui_warning
        - relay_on
        - buzzer_on
        - warning_light_on

  camera_2:
    weights:
      person_detected: 0
      inside_danger_zone: 80
      stay_time_over_threshold: 20
    actions:
      normal: []
      warning:
        - save_history
        - ui_warning
      high:
        - save_history
        - ui_warning
        - relay_on
        - buzzer_on
      critical:
        - save_history
        - ui_warning
        - relay_on
        - buzzer_on
        - warning_light_on

  camera_3:
    weights:
      person_detected: 0
      no_helmet: 80
      no_helmet_over_threshold: 20
      multiple_no_helmet_bonus: 20
      uncertain_detection_penalty: -30
    actions:
      normal: []
      warning:
        - save_history
        - ui_warning
      high:
        - save_history
        - ui_warning
      critical:
        - save_history
        - ui_warning
